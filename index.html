<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact Todo</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; font-size: 13px; }
h1 { font-size: 16px; margin-bottom: 10px; }
button { font-size: 12px; padding: 4px 8px; }
input, select, textarea { font-size: 12px; padding: 3px; width: 100%; box-sizing: border-box; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 4px; text-align: left; vertical-align: top; }
th { background: #f2f2f2; }
textarea { resize: vertical; }
.toolbar { margin-bottom: 10px; }
@media (max-width: 768px) {
  body { margin: 10px; font-size: 12px; }
  th, td { padding: 3px; }
}
</style>
</head>
<body>

<h1>Todo</h1>

<div class="toolbar">
<button onclick="addTask()">Add Task</button>
<button onclick="exportTasks()">Export</button>
<input type="file" id="importFile" style="display:none" onchange="importTasks(event)">
<button onclick="document.getElementById('importFile').click()">Import (Override)</button>
</div>

<div style="overflow-x:auto;">
<table id="taskTable">
<thead>
<tr>
<th style="width:120px">ID</th>
<th style="width:90px">Created</th>
<th style="width:150px">Title</th>
<th>Description</th>
<th style="width:110px">Status</th>
<th style="width:110px">Priority</th>
<th style="width:110px">Due</th>
<<th style="width:80px">Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h2>Recycle Bin</h2>
<div style="overflow-x:auto;">
  <table id="recycleBinTable">
    <thead>
      <tr>
        <th style="width:120px">ID</th>
        <th style="width:90px">Created</th>
        <th style="width:150px">Title</th>
        <th>Description</th>
        <th style="width:110px">Status</th>
        <th style="width:110px">Priority</th>
        <th style="width:110px">Due</th>
        <th style="width:80px">Restore</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const STORAGE_KEY = 'compact_todo_tasks_v2';
let tasks = [];

function generateID() {
  let max = 0;
  tasks.forEach(t => {
    if (t.id && t.id.startsWith('T')) {
      const num = parseInt(t.id.substring(1));
      if (!isNaN(num) && num > max) max = num;
    }
  });
  const next = max + 1;
  return 'T' + String(next).padStart(3, '0');
}

function todayDate() { return new Date().toISOString().split('T')[0]; }
function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
function loadFromStorage() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (data) { try { tasks = JSON.parse(data); } catch(e) { tasks = []; } }
}

function addTask() {
  tasks.unshift({
    id: generateID(),
    created: todayDate(),
    title: '',
    description: '',
    status: 'not started',
    priority: 'normal',
    due: 'later'
  });
  saveToStorage();
  render();
}

function update(index, field, value) { tasks[index][field] = value; saveToStorage(); }
function option(value, selected) { return `<option value="${value}" ${value===selected?'selected':''}>${value}</option>`; }

function render() {
  const tbody = document.querySelector('#taskTable tbody');
  tbody.innerHTML = '';
  tasks.forEach((t, i) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${t.id}</td>
      <td>${t.created}</td>
      <td><input value="${escapeHtml(t.title)}" onchange="update(${i},'title',this.value)"></td>
      <td><textarea rows="1" onchange="update(${i},'description',this.value)">${escapeHtml(t.description)}</textarea></td>
      <td><select onchange="update(${i},'status',this.value)">${option('not started', t.status)}${option('started', t.status)}${option('completed', t.status)}${option('archived', t.status)}</select></td>
      <td><select onchange="update(${i},'priority',this.value)">${option('critical', t.priority)}${option('important', t.priority)}${option('normal', t.priority)}</select></td>
      <td><select onchange="update(${i},'due',this.value)">${option('today', t.due)}${option('this week', t.due)}${option('later', t.due)}</select></td>
      <td style="width:40px; text-align:center; white-space:nowrap;">
        <button onclick="deleteTask(${i})" 
                style="padding:0 5px; font-weight:bold; color:red; font-size:12px;">×</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}
function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Export flat readable format ---
function exportTasks() {
  let text = 'Tasks:\n\n';
  tasks.forEach(t => {
    text += `${t.id} | Created: ${t.created} | Title: ${t.title} | Desc: ${t.description} | Status: ${t.status} | Priority: ${t.priority} | Due: ${t.due}\n`;
  });
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tasks.txt';
  a.click();
}

// --- Import flat or old format ---
function importTasks(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();

  reader.onload = function(e) {
    const lines = e.target.result.split('\n');
    const newTasks = [];

    lines.forEach(line => {
      line = line.trim();
      if (!line) return;

      // Flat format line
      if (line.startsWith('T') && line.includes('| Created:')) {
        const parts = line.split('|').map(p => p.trim());
        const task = { id:'', created:'', title:'', description:'', status:'not started', priority:'normal', due:'later' };
        parts.forEach(p => {
          if (p.match(/^T\d+/)) task.id = p;
          else if (p.startsWith('Created:')) task.created = p.replace('Created:','').trim();
          else if (p.startsWith('Title:')) task.title = p.replace('Title:','').trim();
          else if (p.startsWith('Desc:')) task.description = p.replace('Desc:','').trim();
          else if (p.startsWith('Status:')) task.status = p.replace('Status:','').trim();
          else if (p.startsWith('Priority:')) task.priority = p.replace('Priority:','').trim();
          else if (p.startsWith('Due:')) task.due = p.replace('Due:','').trim();
        });
        newTasks.push(task);
      } else if (line.startsWith('---TASK---')) {
        newTasks.push({});
      } else if (line.includes(':')) {
        // old multi-line format
        const current = newTasks[newTasks.length-1] || {};
        const [key, ...rest] = line.split(':');
        current[key.trim()] = rest.join(':').trim();
        newTasks[newTasks.length-1] = current;
      }
    });

    tasks = newTasks;
    saveToStorage();
    render();
  };

  reader.readAsText(file);
}

// Init
loadFromStorage(); render();

// Recycle Bin arrays and storage
let deletedTasks = [];

function loadDeletedFromStorage() {
  const data = localStorage.getItem('compact_todo_deleted_v2');
  if (data) {
    try {
      deletedTasks = JSON.parse(data);
    } catch(e) {
      deletedTasks = [];
    }
  }
}

function saveDeletedToStorage() {
  localStorage.setItem('compact_todo_deleted_v2', JSON.stringify(deletedTasks));
}

// Delete task (move to recycle bin)
function deleteTask(index) {
  const removed = tasks.splice(index, 1)[0];
  deletedTasks.unshift(removed);
  saveToStorage();
  saveDeletedToStorage();
  render();
  renderRecycleBin();
}

// Restore task from recycle bin
function restoreTask(index) {
  const task = deletedTasks.splice(index, 1)[0];
  tasks.unshift(task);
  saveToStorage();
  saveDeletedToStorage();
  render();
  renderRecycleBin();
}

// Permanent delete function
function permanentDelete(index) {
  deletedTasks.splice(index, 1);
  saveDeletedToStorage();
  renderRecycleBin();
}

// Render Recycle Bin table with permanent delete
function renderRecycleBin() {
  const tbody = document.querySelector('#recycleBinTable tbody');
  tbody.innerHTML = '';
  deletedTasks.forEach((t,i) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${t.id}</td>
      <td>${t.created}</td>
      <td>${escapeHtml(t.title)}</td>
      <td>${escapeHtml(t.description)}</td>
      <td>${t.status}</td>
      <td>${t.priority}</td>
      <td>${t.due}</td>
      <td style="white-space:nowrap; text-align:center;">
        <button onclick="restoreTask(${i})" style="padding:0 5px; font-size:11px; margin-right:3px;">↺</button>
        <button onclick="permanentDelete(${i})" style="padding:0 5px; font-weight:bold; color:red; font-size:12px;">×</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}
// Call on page load
loadDeletedFromStorage();
renderRecycleBin(); 	
</script>
</body>
</html>
